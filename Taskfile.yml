version: "3"

vars:
  BINARY: smart-allow
  CMD: ./cmd/smart-allow
  VERSION:
    sh: node -p "require('./package.json').version" 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo ""
  LDFLAGS: -s -w -X github.com/SocialGouv/smart-allow/internal/appinfo.Version=v{{.VERSION}} -X github.com/SocialGouv/smart-allow/internal/appinfo.Commit={{.COMMIT}}

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list-all

  build:
    desc: Build the classifier binary → ./smart-allow
    env:
      CGO_ENABLED: "0"
    cmds:
      - go build -trimpath -ldflags "{{.LDFLAGS}}" -o {{.BINARY}} {{.CMD}}
    sources:
      - "**/*.go"
      - go.mod
      - package.json
    generates:
      - "{{.BINARY}}"
    status:
      - test -x {{.BINARY}}
      - test "$(./{{.BINARY}} --version 2>/dev/null)" = "{{.BINARY}} v{{.VERSION}}+{{.COMMIT}}"

  install:
    desc: Build and copy binary to $HOME/.claude/bin (no hook wiring)
    deps: [build]
    cmds:
      - install -Dm755 {{.BINARY}} $HOME/.claude/bin/{{.BINARY}}

  install:project:
    desc: Build, install, and register the hook for this git project
    deps: [install]
    cmds:
      - ./{{.BINARY}} install --project --yes

  install:global:
    desc: Build, install, and register the hook globally (all Claude Code sessions)
    deps: [install]
    cmds:
      - ./{{.BINARY}} install --global --yes

  install:status:
    desc: Print where the binary and hooks currently live
    deps: [install]
    cmds:
      - ./{{.BINARY}} install --status

  uninstall:
    desc: Remove the hook (interactive) — leaves binary + policies in place
    deps: [install]
    cmds:
      - ./{{.BINARY}} uninstall

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:verbose:
    desc: Run unit tests (verbose)
    cmds:
      - go test -v ./...

  test:race:
    desc: Run tests with race detector
    cmds:
      - go test -race ./...

  fmt:
    desc: Format Go source files
    cmds:
      - go fmt ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Run fmt and vet
    deps: [fmt, vet]

  check:
    desc: Run all checks (lint + test)
    cmds:
      - task: lint
      - task: test

  smoke:
    desc: Shell smoke test (needs Ollama)
    deps: [build]
    cmds:
      - bash tests/smoke.sh

  smoke:project:
    desc: Isolated project-scoped smoke test
    deps: [build]
    cmds:
      - bash examples/test-project/run-test.sh

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.BINARY}} smart-allow-* classify-command classify-command-*

  version:
    desc: Print the version injected into the binary (from package.json + git)
    deps: [build]
    cmds:
      - ./{{.BINARY}} --version
