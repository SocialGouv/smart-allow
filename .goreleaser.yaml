version: 2

project_name: smart-allow

before:
  hooks:
    - go mod tidy

builds:
  - id: classify-command
    main: ./cmd/classify-command
    binary: classify-command
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows arm64 exists but is rarely deployed — skip to shrink the matrix.
      - goos: windows
        goarch: arm64

archives:
  # One raw binary per os/arch, named classify-command-<os>-<arch>[.exe].
  # Keeps install.sh's download URL trivial (no tar/zip extraction).
  - id: raw-binary
    formats:
      - binary
    name_template: "{{ .Binary }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: SocialGouv
    name: smart-allow
  draft: false
  prerelease: auto
