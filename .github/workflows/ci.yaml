name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: go test
        run: go test ./...

      - name: go vet
        run: go vet ./...

      - name: go build (smoke)
        run: go build ./cmd/classify-command
